<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Form</title>
</head>

<body>

<center>
    <h1>APPLICATION FORM</h1>

    <p>
        Thank you for your interest in working with us.
    </p>

    <form>

        <table cellpadding="10">

            <tr>
                <td align="right"><b>* Full Name:</b></td>
                <td>
                    <input type="text" name="fname" placeholder="Enter your full name" >
                </td>
            </tr>

            <tr>
                <td align="right"><b>* Email:</b></td>
                <td>
                    <input type="email" name="email" placeholder="Enter your Email" >
                </td>
            </tr>

            <tr>
                <td align="right"><b>* Age:</b></td>
                <td>
                    <input type="number" name="age" placeholder="Age" 
                </td>
            </tr>

            <tr>
                <td align="right">
                    Which option best describes your current role?
                </td>
                <td>
                    <select>
                        <option>Student</option>
                        <option>1</option>
                        <option>2</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align="right">
                    <b>* Would you like to list references?</b>
                </td>
                <td>
                    <input type="radio" name="ref"> Yes
                    <br>
                    <input type="radio" name="ref"> No
                </td>
            </tr>

            <tr>
                <td align="right">
                    Which position would you like to apply for?
                </td>
                <td>
                    <select>
                        <option>Select an option</option>
                        <option>Web Developer</option>
                        <option>Designer</option>
                        <option>Tester</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align="right" >
                    Which programming languages do you know?
                </td>

                <td>
                    <input type="checkbox" id="languages1" name="languages1" value="Java"> 
                    <label for="languages1">Java</label><br> 

                    <input type="checkbox" id="languages2" name="languages2" value="Python"> 
                    <label for="languages2">Python</label><br> 

                    <input type="checkbox" id="languages3" name="languages3" value="JavaScript"> 
                    <label for="languages3">JavaScript</label><br> 

                    <input type="checkbox" id="languages4" name="languages4" value="C++"> 
                    <label for="languages4">C++</label><br> 

                    <input type="checkbox" id="languages5" name="languages5" value="Swift"> 
                    <label for="languages5">Swift</label><br> 

                    <input type="checkbox" id="languages6" name="languages6" value="Ruby">
                     <label for="languages6">Ruby</label><br>

                    <input type="checkbox" id="languages7" name="languages7" value=".NET"> 
                    <label for="languages7">.NETt</label><br>
                </td>
            </tr>

            <tr>
                <td align="right">
                    Any Comments?
                </td>

                <td>
                    <textarea
                        placeholder="Enter your comment here..."></textarea>
                </td>
            </tr>

        </table>

    </form>

</center>

</body>
</html>
